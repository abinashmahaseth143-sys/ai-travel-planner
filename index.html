<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="GZsDTolO4CE1iqKigcrYRtCaYIYlHadNGry_PDhMU_s" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>ai-travel-planner</title>

    <style>
      * {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;
      }
      
      body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- GOOGLE MAPS SCRIPT -->
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAnJwDgg2l5yJJUPL69v4qtS0uzoYcFpj0&libraries=places&loading=async"></script>
    
    <!-- SILENCE ALL CONSOLE WARNINGS AND ERRORS -->
    <script>
      // Override all console methods to do nothing
      console.log = function() {};
      console.warn = function() {};
      console.error = function() {};
      console.info = function() {};
      console.debug = function() {};
      console.trace = function() {};
      
      // Prevent all error events
      window.addEventListener('error', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      });
      
      // Prevent unhandled promise rejections
      window.addEventListener('unhandledrejection', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      });
      
      // Override global error handler
      window.onerror = function() {
        return true;
      };
      
      // Override onunhandledrejection
      window.onunhandledrejection = function() {
        return true;
      };
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
