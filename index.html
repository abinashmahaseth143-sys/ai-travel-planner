<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="GZsDTolO4CE1iqKigcrYRtCaYIYlHadNGry_PDhMU_s" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>AI Travel Planner</title>

    <style>
      * {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;
      }
      
      body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- GOOGLE MAPS SCRIPT -->
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAnJwDgg2l5yJJUPL69v4qtS0uzoYcFpj0&libraries=places&loading=async"></script>
    
    <!-- ONLY SILENCE SPECIFIC WARNINGS (NOT ALL ERRORS) -->
    <script>
      // Save original console methods
      const originalConsoleError = console.error;
      const originalConsoleWarn = console.warn;
      
      // Only filter out specific annoying warnings
      console.error = function(...args) {
        const message = args[0] || '';
        // Allow Gemini API errors to show (they're important for debugging)
        if (message.includes('Violation') || message.includes('Forced reflow')) {
          return; // Hide performance violations
        }
        originalConsoleError.apply(console, args);
      };
      
      console.warn = function(...args) {
        const message = args[0] || '';
        // Filter out React performance warnings but keep API errors
        if (message.includes('Violation') || message.includes('Forced reflow')) {
          return;
        }
        originalConsoleWarn.apply(console, args);
      };
      
      // Keep error events for debugging (don't silence them)
      // Only prevent if it's a known non-critical error
      window.addEventListener('error', function(e) {
        const message = e.message || '';
        // Allow errors to show unless they're performance related
        if (message.includes('ResizeObserver') || message.includes('Script error')) {
          e.preventDefault();
          return false;
        }
        // Don't prevent other errors - let them show for debugging
        return true;
      });
      
      // Don't completely silence unhandled rejections - log them
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled rejection:', e.reason);
        // Don't prevent - let it show
        return false;
      });
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
